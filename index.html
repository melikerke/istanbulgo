<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ TEMEL SEO ═══ -->
    <title>IstanbulGo — Your Istanbul Travel Companion | Tickets, Guides & Trip Planner</title>
    <meta name="description" content="Plan your perfect Istanbul trip. Skip-the-line tickets for Hagia Sophia, Basilica Cistern & Topkapi Palace. Local guides, transport tips, Turkish phrases & AI trip planner. Free to use." />
    <meta name="keywords" content="Istanbul travel, Istanbul tickets, Hagia Sophia tickets, Istanbul guide, Istanbul trip planner, things to do Istanbul, Bosphorus cruise, Turkish bath, Istanbul tourist app" />
    <meta name="author" content="IstanbulGo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://istanbulgo.vercel.app/" />

    <!-- ═══ OPEN GRAPH (Facebook, WhatsApp, LinkedIn) ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="IstanbulGo — Your Istanbul Travel Companion" />
    <meta property="og:description" content="Skip-the-line tickets, local guides, transport tips & AI trip planner for Istanbul. Free to use." />
    <meta property="og:url" content="https://istanbulgo.vercel.app/" />
    <meta property="og:image" content="https://istanbulgo.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="IstanbulGo" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══ TWITTER CARD ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IstanbulGo — Your Istanbul Travel Companion" />
    <meta name="twitter:description" content="Skip-the-line tickets, local guides & AI trip planner for Istanbul." />
    <meta name="twitter:image" content="https://istanbulgo.vercel.app/og-image.jpg" />

    <!-- ═══ FAVICON ═══ -->
    <!-- 
      Favicon dosyaları oluşturup public/ klasörüne koy:
      - favicon.ico (32x32)
      - apple-touch-icon.png (180x180)
      - favicon-32x32.png (32x32)
      - favicon-16x16.png (16x16)
      Canva'da veya realfavicongenerator.net'te ücretsiz yapabilirsin.
    -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- ═══ TEMA RENGİ (mobil tarayıcı üst bar) ═══ -->
    <meta name="theme-color" content="#0B1220" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="IstanbulGo" />

    <!-- ═══ STRUCTURED DATA (Google Rich Results) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "IstanbulGo",
      "description": "Your personal Istanbul travel companion — tickets, guides, transport tips & AI trip planner",
      "url": "https://istanbulgo.vercel.app/",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Free to use with optional premium features"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "150"
      },
      "author": {
        "@type": "Organization",
        "name": "IstanbulGo"
      }
    }
    </script>

    <!-- ═══ TOURIST ATTRACTION SCHEMA (Top 3) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Top Istanbul Attractions",
      "description": "Most popular attractions in Istanbul with skip-the-line tickets",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "TouristAttraction",
            "name": "Hagia Sophia",
            "description": "One of Istanbul's most iconic landmarks, blending Byzantine and Ottoman history",
            "address": { "@type": "PostalAddress", "addressLocality": "Istanbul", "addressRegion": "Sultanahmet" },
            "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "48000" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "TouristAttraction",
            "name": "Basilica Cistern",
            "description": "Underground wonder with 336 marble columns and famous Medusa heads",
            "address": { "@type": "PostalAddress", "addressLocality": "Istanbul", "addressRegion": "Sultanahmet" },
            "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.8", "reviewCount": "32000" }
          }
        },
        {
          "@type": "ListItem",
          "position": 3,
          "item": {
            "@type": "TouristAttraction",
            "name": "Topkapi Palace",
            "description": "Main residence of Ottoman sultans for 400 years with Imperial Treasury",
            "address": { "@type": "PostalAddress", "addressLocality": "Istanbul", "addressRegion": "Sultanahmet" },
            "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "41000" }
          }
        }
      ]
    }
    </script>

    <!-- ═══ PRECONNECT (hız optimizasyonu) ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
